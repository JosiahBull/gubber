name: Run golangci-lint
on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  golangci:
    name: lint checker
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - uses: actions/setup-go@v6

      - name: Run golang-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: latest
